<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agendar na Barbearia</title>
<style>
body{font-family:Arial, Helvetica, sans-serif;background:#111;color:white;padding:20px;}
.container{max-width:500px;margin:auto;}
input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;background:#222;color:white;font-size:16px;}
button{background:#c59d5f;color:black;font-weight:bold;cursor:pointer;}
button:hover{background:#e6b76b;}
#horarios button{margin:5px;background:#333;color:white;}
#horarios button.horarioSelecionado{background:#c59d5f;color:black;}
.agendamento{background:#222;padding:10px;margin-top:10px;border-radius:8px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
const SUPABASE_ANON_KEY = 'SUA_CHAVE_ANONIMA';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let barbeariaId = new URLSearchParams(window.location.search).get('barbearia');
let horarioSelecionado = null;

async function gerarHorarios(){
  let data = document.getElementById("data").value;
  if(!data) return;
  let div = document.getElementById("horarios");
  div.innerHTML = "";

  const { data: agendamentos } = await supabase
    .from('agendamentos')
    .select('*')
    .eq('barbearia_id', barbeariaId)
    .eq('data', data);

  for(let h=9;h<=18;h++){
    for(let m=0;m<60;m+=15){
      let minuto = m.toString().padStart(2,'0');
      let horaStr = `${h}:${minuto}`;
      let ocupado = agendamentos.find(a=>a.hora===horaStr);
      if(!ocupado){
        let btn = document.createElement("button");
        btn.innerText = horaStr;
        btn.onclick = ()=>{ horarioSelecionado = horaStr; document.querySelectorAll("#horarios button").forEach(b=>b.classList.remove("horarioSelecionado")); btn.classList.add("horarioSelecionado");};
        div.appendChild(btn);
      }
    }
  }
}

async function confirmarAgendamento(){
  let nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  let servico = document.getElementById("servico").value;
  let data = document.getElementById("data").value;

  if(!nome||!telefone||!data||!horarioSelecionado) return alert("Preencha todos os campos e selecione horário");

  await supabase.from('agendamentos').insert([{
    barbearia_id: barbeariaId,
    nome_cliente: nome,
    telefone_cliente: telefone,
    servico_nome: servico,
    data:data,
    hora:horarioSelecionado,
    criado_em: new Date()
  }]);

  alert("Agendamento confirmado!");
  gerarHorarios();
}
</script>
</head>
<body>
<div class="container">
<h1>💈 Agendar na Barbearia</h1>
<label>Serviço</label>
<select id="servico">
<option value="Corte">Corte</option>
<option value="Barba">Barba</option>
<option value="Sobrancelha">Sobrancelha</option>
</select>

<label>Data</label>
<input type="date" id="data" onchange="gerarHorarios()">
<div id="horarios"></div>

<label>Nome</label><input id="nome">
<label>Telefone</label><input id="telefone">
<button onclick="confirmarAgendamento()">Confirmar Agendamento</button>
</div>
</body>
</html>
